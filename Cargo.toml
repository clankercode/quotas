[package]
name = "quotas"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
thiserror = "1"
dirs = "5"
chrono = { version = "0.4", features = ["serde"] }
arboard = "3"
url = "2"
async-trait = "0.1"

ratatui = "0.26"
crossterm = "0.27"

[profile.release]
lto = true
codegen-units = 1
